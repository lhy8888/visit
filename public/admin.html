<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin - Visitor Access</title>
  <link rel="stylesheet" href="/style.css">
  <script src="/admin.js" defer></script>
</head>
<body class="page-shell admin-page">
  <main class="page admin-layout">
    <section class="hero">
      <h1>Dashboard</h1>
    </section>

    <section id="status-message" class="status" aria-live="polite"></section>

    <section id="login-card" class="card admin-section">
      <div class="admin-header">
        <div>
          <p class="eyebrow">Sign in</p>
          <h2>Admin access</h2>
        </div>
      </div>

      <form id="login-form" class="form-grid">
        <div class="field">
          <label for="username">Username</label>
          <input id="username" name="username" autocomplete="username" placeholder="admin">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" placeholder="123456">
        </div>
        <div class="field full">
          <div class="admin-actions">
            <button id="login-button" type="submit">Sign in</button>
            <button id="clear-login" type="button" class="secondary">Clear form</button>
          </div>
        </div>
      </form>
    </section>

    <section id="dashboard" class="admin-grid admin-hidden">
      <section class="card admin-section">
        <div class="admin-header">
          <div>
            <p class="eyebrow">Session</p>
            <h2 id="session-banner" class="admin-session-user"></h2>
          </div>
          <div class="admin-actions">
            <button id="refresh-dashboard" type="button" class="secondary">Refresh</button>
            <button id="logout-button" type="button" class="secondary">Sign out</button>
          </div>
        </div>

        <div id="summary-metrics" class="admin-stats"></div>
      </section>

      <section class="card admin-section">
        <div class="admin-header">
          <div>
            <p class="eyebrow">Visitors</p>
            <h2 id="visitor-table-title">Today</h2>
          </div>
          <span id="visitor-table-count" class="pill accent">0 records</span>
        </div>

        <div class="table-wrap">
          <table class="admin-table" aria-label="Visitor table">
            <colgroup>
              <col class="col-visitor">
              <col class="col-register">
              <col class="col-person">
              <col class="col-date">
              <col class="col-status">
              <col class="col-in">
              <col class="col-out">
              <col class="col-action">
            </colgroup>
            <thead>
            <tr>
              <th>Visitor</th>
              <th>Register No</th>
              <th>Visited person</th>
              <th>Date</th>
              <th>Status</th>
              <th>In</th>
                <th>Out</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="visitor-table-body"></tbody>
          </table>
        </div>

        <div class="history-strip">
          <div class="admin-header compact">
            <div>
              <p class="eyebrow">History</p>
              <h2>Filters</h2>
            </div>
            <div class="admin-actions">
              <button id="export-button" type="button" class="secondary">Export Excel</button>
            </div>
          </div>

          <form id="history-form" class="form-grid history-form">
            <div class="field">
              <label for="history-from">From</label>
              <input id="history-from" name="from" type="date">
            </div>
            <div class="field">
              <label for="history-to">To</label>
              <input id="history-to" name="to" type="date">
            </div>
            <div class="field">
              <label for="history-status">Status</label>
              <select id="history-status" name="status">
                <option value="">All statuses</option>
                <option value="registered">Registered</option>
                <option value="checked_in">Checked in</option>
                <option value="checked_out">Checked out</option>
                <option value="void">Void</option>
              </select>
            </div>
            <div class="field full">
              <label for="history-keyword">Keyword</label>
              <input id="history-keyword" name="keyword" placeholder="Visitor name, company, visited person, register no...">
            </div>
            <div class="field full">
              <div class="admin-actions">
                <button type="submit">Apply</button>
                <button id="history-reset" type="button" class="secondary">Reset</button>
              </div>
            </div>
          </form>
        </div>
      </section>

      <section class="card admin-section">
        <div class="admin-header">
          <div>
            <p class="eyebrow">Settings</p>
            <h2>Settings</h2>
          </div>
          <div class="admin-actions">
            <button id="settings-save" type="submit" form="settings-form">Save settings</button>
          </div>
        </div>

        <form id="settings-form" class="form-grid settings-form">
          <div class="field full">
            <label for="siteTitle">Site title</label>
            <input id="siteTitle" name="siteTitle" type="text" autocomplete="off">
          </div>
          <div class="field full">
            <label for="welcomeMessage">Welcome message</label>
            <textarea id="welcomeMessage" name="welcomeMessage" rows="2"></textarea>
          </div>
          <div class="field full logo-field">
            <label for="logoUpload">Logo file</label>
            <input id="logoUpload" name="logoUpload" type="file" accept="image/png,image/jpeg,image/jpg,image/webp,image/gif,image/svg+xml">
            <input id="logoPath" name="logoPath" type="hidden">
            <div class="logo-preview-row">
              <img id="logoPreview" class="logo-preview" alt="Current logo preview">
              <p id="logoPathNote" class="helper compact"></p>
            </div>
          </div>
          <div class="field">
            <label for="defaultTimezone">Timezone</label>
            <select id="defaultTimezone" name="defaultTimezone">
              <option value="Europe/London">Europe/London</option>
              <option value="UTC">UTC</option>
              <option value="Europe/Paris">Europe/Paris</option>
              <option value="Europe/Berlin">Europe/Berlin</option>
              <option value="Europe/Madrid">Europe/Madrid</option>
              <option value="America/New_York">America/New_York</option>
              <option value="America/Chicago">America/Chicago</option>
              <option value="America/Los_Angeles">America/Los_Angeles</option>
              <option value="Asia/Dubai">Asia/Dubai</option>
              <option value="Asia/Singapore">Asia/Singapore</option>
            </select>
          </div>
          <div class="field">
            <label for="pinLength">PIN length</label>
            <input id="pinLength" name="pinLength" type="number" min="4" max="6" step="1" inputmode="numeric">
          </div>
          <div class="field">
            <label for="dataRetentionDays">Data retention days</label>
            <input id="dataRetentionDays" name="dataRetentionDays" type="number" min="1" max="365" step="1" inputmode="numeric">
          </div>
          <div class="field full toggle-field">
            <label class="settings-toggle" for="enableQrCheckin">
              <input id="enableQrCheckin" name="enableQrCheckin" type="checkbox">
              <span>Enable QR check-in</span>
            </label>
          </div>
          <div class="field full toggle-field">
            <label class="settings-toggle" for="enablePinCheckin">
              <input id="enablePinCheckin" name="enablePinCheckin" type="checkbox">
              <span>Enable PIN check-in</span>
            </label>
          </div>
          <div class="field full">
            <p class="helper compact">These values apply to the public page, result page, and reception flow.</p>
          </div>
        </form>
      </section>
    </section>
  </main>
</body>
</html>
