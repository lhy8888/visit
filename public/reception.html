<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Reception - Visitor Register</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="page-shell reception-page">
  <main class="page">
    <section class="hero">
      <div class="brand">
        <img id="site-logo" class="brand-logo" src="/images/logo.png" alt="Company logo" hidden>
        <div>
          <p class="eyebrow">Reception</p>
          <h1 id="page-title">Visitor kiosk</h1>
        </div>
      </div>

      <div class="mode-switch kiosk-switch" role="tablist" aria-label="Visitor flow">
        <button id="checkin-mode-button" class="mode-button active" type="button" data-kiosk-mode="checkin" aria-pressed="true">Check in</button>
        <button id="register-mode-button" class="mode-button" type="button" data-kiosk-mode="register" aria-pressed="false">Direct registration</button>
      </div>

      <p id="status-message" class="status" aria-live="polite"></p>
    </section>

    <section class="reception-grid">
      <article id="checkin-panel" class="card checkin-panel">
        <div class="panel-head">
          <p class="eyebrow">Check-in</p>
          <h2>Choose PIN input or camera scan</h2>
        </div>

        <div class="mode-switch checkin-switch" role="tablist" aria-label="Check-in method">
          <button id="pin-mode-button" class="mode-button active" type="button" data-checkin-mode="pin" aria-pressed="true">PIN input</button>
          <button id="camera-mode-button" class="mode-button" type="button" data-checkin-mode="camera" aria-pressed="false">Camera scan</button>
        </div>

        <article id="pin-panel" class="inner-panel">
          <form id="lookup-form" class="lookup-form" novalidate>
            <input id="identifier-input" name="identifier" type="text" autocomplete="off" placeholder="PIN, register number or QR token">
            <button id="lookup-button" type="submit">Check in</button>
          </form>
        </article>

        <article id="camera-panel" class="inner-panel hidden">
          <video id="scanner-video" class="scanner-video" autoplay muted playsinline hidden></video>

          <div class="toolbar">
            <button id="start-scan-button" class="secondary" type="button">Start camera scan</button>
            <button id="stop-scan-button" class="secondary" type="button" hidden>Stop scan</button>
          </div>
        </article>
      </article>

      <article id="register-panel" class="card checkin-panel hidden">
        <div class="panel-head">
          <p class="eyebrow">Direct registration</p>
          <h2>Register a visitor without a prior booking</h2>
        </div>

        <form id="registration-form" class="form-grid register-form" novalidate>
          <div class="field">
            <label for="visitor_name">Visitor name</label>
            <input id="visitor_name" name="visitor_name" type="text" autocomplete="name" required placeholder="Jane Doe">
          </div>

          <div class="field">
            <label for="company">Company</label>
            <input id="company" name="company" type="text" autocomplete="organization" placeholder="Acme Ltd">
          </div>

          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="email" placeholder="jane@example.com">
          </div>

          <div class="field">
            <label for="phone">Phone</label>
            <input id="phone" name="phone" type="tel" autocomplete="tel" placeholder="+44 7000 000000">
          </div>

          <div class="field">
            <label for="host_name">Person to visit</label>
            <input id="host_name" name="host_name" type="text" required placeholder="John Smith">
          </div>

          <div class="field">
            <label for="scheduled_date">Visit date</label>
            <input id="scheduled_date" name="scheduled_date" type="date" required>
          </div>

          <div class="field full">
            <label for="visit_purpose">Visit purpose</label>
            <textarea id="visit_purpose" name="visit_purpose" placeholder="Meeting, delivery, interview, etc."></textarea>
          </div>

          <div class="field full">
            <button id="registration-submit-button" type="submit">Submit</button>
          </div>
        </form>

        <p class="helper">We will generate a register number, a PIN and a QR code after submission.</p>
        <p id="registration-status" class="status" aria-live="polite"></p>
      </article>
    </section>
  </main>

  <script src="/reception.js" defer></script>
</body>
</html>
