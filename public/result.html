<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registration result</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="page-shell result-page">
  <main class="page">
    <section class="hero">
      <p class="eyebrow">Registration complete</p>
      <h1 id="result-title">Your PIN is ready</h1>
      <p class="lead">Show this PIN or the QR code at reception. Keep this page handy for check-in.</p>
    </section>

    <section class="panel-grid result-grid">
      <article class="card result-main">
        <div class="pin-feature">
          <span>PIN code</span>
          <strong id="pin-code">Loading...</strong>
        </div>

        <div class="result-metrics result-summary">
          <div class="metric">
            <span>Visitor name</span>
            <strong id="visitor-name">Loading...</strong>
          </div>
          <div class="metric">
            <span>Planned date</span>
            <strong id="scheduled-date">Loading...</strong>
          </div>
          <div class="metric status-metric">
            <span>Status</span>
            <strong id="status">Loading...</strong>
          </div>
        </div>

        <div class="toolbar">
          <button id="copy-pin" class="secondary" type="button">Copy PIN</button>
          <a class="secondary button-link" href="/">Create another registration</a>
        </div>
        <p id="result-message" class="helper"></p>
      </article>

      <aside class="card">
        <div class="qr-box">
          <img id="qr-image" alt="QR code for check-in" hidden>
        </div>
        <p class="helper" id="qr-content">Loading QR code...</p>
      </aside>
    </section>
  </main>

  <script src="/result.js" defer></script>
</body>
</html>
